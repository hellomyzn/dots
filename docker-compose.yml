version: '3.6'
services:
  emacs:
    restart: always
    build:
      context: .
      dockerfile: ./infra/docker/emacs/Dockerfile
    container_name: 'emacs'
    hostname: 'emacs'
    working_dir: '/opt/org/'
    platform: linux/amd64
    tty: true
    volumes:
      - ./src/emacs/.emacs.d:/home/myzn/.emacs.d
      - ./src/emacs/org:/opt/org
      - ./src/emacs/.bashrc:/home/myzn/.bashrc
    environment:
      - TZ=Asia/Tokyo

  python:
    build:
      context: .
      dockerfile: ./infra/docker/python/Dockerfile
    container_name: 'python'
    hostname: 'python'
    working_dir: '/opt/work/'
    restart: always
    tty: true
    volumes:
      - type: bind
        source: ./src/python
        target: /opt/work
      - type: bind
        source: ./src/emacs/org
        target: /opt/org
    environment:
      - TZ=Asia/Tokyo
      - LOG_LEVEL=INFO
    networks:
      - internal_network

networks:
  internal_network: